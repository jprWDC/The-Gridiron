<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Gridiron | Stats</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#080808; color:#fff; font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; padding:20px; }
    header { display:flex; align-items:baseline; gap:14px; margin-bottom:20px; padding-bottom:10px; border-bottom:1px solid #1c1c1c; }
    header h1 { font-size:18px; letter-spacing:4px; font-weight:900; text-transform:uppercase; }
    header h1 a { color:#f0c830; text-decoration:none; }
    header h1 a:hover { opacity:0.8; }
    header .sub { font-size:11px; color:#444; letter-spacing:1px; }
    .nav-links { margin-left:auto; display:flex; gap:10px; align-items:center; }
    .nav-links a { font-size:10px; color:#555; text-decoration:none; letter-spacing:1px; font-weight:700; text-transform:uppercase; transition:color .15s; }
    .nav-links a:hover, .nav-links a.active { color:#f0c830; }

    .pos-tabs { display:flex; gap:4px; margin-bottom:20px; }
    .pos-tab { padding:6px 18px; background:#111; border:1px solid #222; border-radius:2px; font-size:10px; font-weight:700; letter-spacing:2px; color:#555; cursor:pointer; text-transform:uppercase; transition:all .12s; font-family:inherit; }
    .pos-tab:hover { border-color:#444; color:#fff; }
    .pos-tab.active { background:#0d0a00; border-color:#c8a020; color:#f0c830; }

    .lb-wrap { max-width:900px; }
    .lb-tbl { width:100%; border-collapse:collapse; font-size:11px; }
    .lb-tbl th { text-align:left; padding:6px 10px; font-size:9px; color:#333; font-weight:700; letter-spacing:1px; border-bottom:1px solid #1e1e1e; }
    .lb-tbl th:not(:first-child):not(:nth-child(2)):not(:nth-child(3)) { text-align:right; }
    .lb-tbl td { padding:7px 10px; border-bottom:1px solid #111; color:rgba(255,255,255,0.55); }
    .lb-tbl td:not(:first-child):not(:nth-child(2)):not(:nth-child(3)) { text-align:right; }
    .lb-tbl tr:nth-child(even) td { background:#0a0a0a; }
    .lb-tbl td:first-child { color:#555; font-size:9px; text-align:center; width:28px; }
    .lb-tbl td:nth-child(2) { color:#fff; font-weight:700; }
    .lb-tbl td:nth-child(3) { color:#f0c830; font-size:9px; font-weight:700; letter-spacing:1px; }
    .lb-tbl tr.my-row td { background:#0d0a00 !important; }
    .lb-tbl tr.my-row td:nth-child(2) { color:#f0c830; }
    .lb-tbl tr:nth-child(1) td { background:#0e0e00 !important; }
    .lb-tbl tr:nth-child(2) td { background:#0c0c0c !important; }
    .lb-tbl tr:nth-child(3) td { background:#0c0c0c !important; }
    .lb-tbl td a { color:inherit; text-decoration:none; }
    .lb-tbl td a:hover { color:#f0c830; }
    .no-data { color:#333; font-size:12px; padding:32px 0; letter-spacing:2px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
<header>
  <h1><a href="gridiron_season.html">THE GRIDIRON</a></h1>
  <span class="sub">STATS</span>
  <div class="nav-links">
    <a href="gridiron_season.html">LEAGUE</a>
    <a href="gridiron_standings.html">STANDINGS</a>
    <a href="gridiron_stats.html" class="active">STATS</a>
    <a href="gridiron_draft.html">DRAFT</a>
  </div>
</header>

<div class="pos-tabs">
  <button class="pos-tab active" onclick="showTab('QB')">QB</button>
  <button class="pos-tab" onclick="showTab('RB')">RB</button>
  <button class="pos-tab" onclick="showTab('WR')">WR</button>
  <button class="pos-tab" onclick="showTab('K')">K</button>
</div>

<div class="lb-wrap" id="lb-wrap"></div>

<script>
const SUPA_URL = 'https://pdxvbmzcqkbgcffltsjs.supabase.co';
const SUPA_KEY = 'sb_publishable_jv5woX21YcyMhIjzUJgGuA_r-6YrP9F';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

var currentTab = 'QB';
var allStats = [];

function pctFmt(n,d){ return d?(n/d*100).toFixed(0)+'%':'—'; }
function avgFmt(n,d){ return d?(n/d).toFixed(1):'—'; }
function qbRating(p){ if(!p.att)return '—'; var a=Math.max(0,Math.min(2.375,(p.cmp/p.att-0.3)*5)); var b=Math.max(0,Math.min(2.375,(p.pass_yds/p.att-3)*0.25)); var c=Math.max(0,Math.min(2.375,p.pass_td/p.att*20)); var d=Math.max(0,Math.min(2.375,2.375-p.int_thrown/p.att*25)); return ((a+b+c+d)/6*100).toFixed(1); }

async function loadStats(){
  var { data } = await sb.from('player_stats').select('*');
  allStats = data || [];
  render();
}

function showTab(pos){
  currentTab = pos;
  document.querySelectorAll('.pos-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function render(){
  var stats = allStats.filter(s => s.pos === currentTab);
  stats.sort((a,b) => {
    if(currentTab === 'QB') return (b.pass_yds || 0) - (a.pass_yds || 0);
    if(currentTab === 'RB') return (b.rush_yds || 0) - (a.rush_yds || 0);
    if(currentTab === 'WR') return (b.rec_yds || 0) - (a.rec_yds || 0);
    return (b.fg || 0) - (a.fg || 0);
  });

  if(!stats.length){
    document.getElementById('lb-wrap').innerHTML = '<div class="no-data">No stats available</div>';
    return;
  }

  var html = '<table class="lb-tbl"><thead><tr><th>#</th><th>PLAYER</th><th>TEAM</th>';
  if(currentTab === 'QB'){
    html += '<th>COMP</th><th>ATT</th><th>CMP%</th><th>YDS</th><th>TD</th><th>INT</th><th>RATING</th>';
  } else if(currentTab === 'RB'){
    html += '<th>ATT</th><th>YDS</th><th>AVG</th><th>TD</th><th>REC</th><th>REC YDS</th>';
  } else if(currentTab === 'WR'){
    html += '<th>REC</th><th>YDS</th><th>AVG</th><th>TD</th><th>TARGET</th>';
  } else {
    html += '<th>FG</th><th>FGA</th><th>%</th><th>XP</th><th>XPA</th><th>PTS</th>';
  }
  html += '</tr></thead><tbody>';

  stats.forEach((s,i) => {
    html += '<tr class="'+(s.my_team?'my-row':'')+'"><td>'+(i+1)+'</td><td>'+s.player_name+'</td><td>'+s.team_abbr+'</td>';
    if(currentTab === 'QB'){
      html += '<td>'+(s.cmp || 0)+'</td><td>'+(s.att || 0)+'</td><td>'+pctFmt(s.cmp,s.att)+'</td><td>'+(s.pass_yds || 0)+'</td><td>'+(s.pass_td || 0)+'</td><td>'+(s.int_thrown || 0)+'</td><td>'+qbRating(s)+'</td>';
    } else if(currentTab === 'RB'){
      html += '<td>'+(s.rush_att || 0)+'</td><td>'+(s.rush_yds || 0)+'</td><td>'+avgFmt(s.rush_yds,s.rush_att)+'</td><td>'+(s.rush_td || 0)+'</td><td>'+(s.receptions || 0)+'</td><td>'+(s.rec_yds || 0)+'</td>';
    } else if(currentTab === 'WR'){
      html += '<td>'+(s.receptions || 0)+'</td><td>'+(s.rec_yds || 0)+'</td><td>'+avgFmt(s.rec_yds,s.receptions)+'</td><td>'+(s.rec_td || 0)+'</td><td>'+(s.targets || 0)+'</td>';
    } else {
      html += '<td>'+(s.fg || 0)+'</td><td>'+(s.fga || 0)+'</td><td>'+pctFmt(s.fg,s.fga)+'</td><td>'+(s.xp || 0)+'</td><td>'+(s.xpa || 0)+'</td><td>'+(s.points || 0)+'</td>';
    }
    html += '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('lb-wrap').innerHTML = html;
}

loadStats();
</script>
</body>
</html>
