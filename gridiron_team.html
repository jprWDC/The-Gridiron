<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Gridiron | Team</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#080808; color:#fff; font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; padding:20px; }
    header { display:flex; align-items:baseline; gap:14px; margin-bottom:20px; padding-bottom:10px; border-bottom:1px solid #1c1c1c; }
    header h1 { font-size:18px; letter-spacing:4px; font-weight:900; text-transform:uppercase; }
    header .sub { font-size:11px; color:#444; letter-spacing:1px; }
    .nav-links { margin-left:auto; display:flex; gap:10px; align-items:center; }
    .nav-links a { font-size:10px; color:#555; text-decoration:none; letter-spacing:1px; font-weight:700; text-transform:uppercase; transition:color .15s; }
    .nav-links a:hover { color:#f0c830; }

    .team-hero { margin-bottom:24px; padding:20px; background:#111; border:1px solid #1e1e1e; border-radius:3px; display:flex; align-items:center; gap:20px; }
    .hero-abbr { font-size:48px; font-weight:900; color:#f0c830; letter-spacing:4px; flex-shrink:0; }
    .hero-info { flex:1; }
    .hero-city { font-size:11px; color:#555; letter-spacing:2px; text-transform:uppercase; }
    .hero-name { font-size:24px; font-weight:900; color:#fff; }
    .hero-conf { font-size:10px; color:#444; letter-spacing:1px; margin-top:3px; }
    .hero-record { font-size:28px; font-weight:900; color:#f0c830; flex-shrink:0; letter-spacing:2px; }
    .hero-pct { font-size:11px; color:#555; text-align:right; }

    .sec-hdr { font-size:10px; font-weight:700; color:#f0c830; letter-spacing:3px; text-transform:uppercase; margin:20px 0 12px; display:flex; align-items:center; gap:10px; }
    .sec-hdr::after { content:''; flex:1; height:1px; background:#1e1e1e; }

    /* Roster */
    .roster-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:8px; }
    @media(max-width:700px){ .roster-grid { grid-template-columns:repeat(2,1fr); } }
    .pos-group { }
    .pos-group-title { font-size:9px; font-weight:700; letter-spacing:2px; color:#555; text-transform:uppercase; margin-bottom:6px; padding-bottom:4px; border-bottom:1px solid #1a1a1a; }
    .player-card { padding:7px 9px; background:#0e0e0e; border:1px solid #1a1a1a; border-radius:2px; margin-bottom:4px; }
    .pc-name { font-size:11px; font-weight:700; color:#fff; }
    .pc-ovr { font-size:10px; color:#f0c830; font-weight:900; }
    .pc-proj { font-size:9px; color:#444; margin-top:2px; }
    .pos-qb .pos-group-title { color:#7ab8f5; }
    .pos-rb .pos-group-title { color:#7af5a0; }
    .pos-wr .pos-group-title { color:#f5c87a; }
    .pos-k  .pos-group-title { color:#d07af5; }

    /* Stats */
    .stat-row { display:flex; gap:20px; flex-wrap:wrap; margin-bottom:16px; }
    .stat-card { background:#0e0e0e; border:1px solid #1a1a1a; border-radius:2px; padding:10px 14px; min-width:140px; }
    .sc-pos { font-size:9px; font-weight:700; letter-spacing:1px; color:#555; text-transform:uppercase; margin-bottom:6px; }
    .sc-name { font-size:12px; font-weight:700; color:#fff; margin-bottom:5px; }
    .sc-line { font-size:11px; color:#888; }

    /* Game log */
    .game-log-tbl { width:100%; border-collapse:collapse; font-size:11px; max-width:600px; }
    .game-log-tbl th { text-align:left; padding:5px 8px; font-size:9px; color:#333; font-weight:700; letter-spacing:1px; border-bottom:1px solid #1e1e1e; }
    .game-log-tbl td { padding:7px 8px; border-bottom:1px solid #111; color:rgba(255,255,255,0.55); }
    .game-log-tbl td:first-child { color:#555; }
    .game-log-tbl td.win { color:#3db86a; font-weight:700; }
    .game-log-tbl td.loss { color:#e06060; }
    .game-log-tbl td.tie { color:#aaa; }
    .no-data { color:#333; font-size:12px; padding:16px 0; letter-spacing:1px; }
  </style>
</head>
<body>
<header>
  <h1>The Gridiron</h1>
  <span class="sub" id="hdr-sub">TEAM</span>
  <div class="nav-links">
    <a href="gridiron_season.html">&larr; Season</a>
    <a href="gridiron_stats.html">Stats</a>
    <a href="gridiron_draft.html">Draft</a>
  </div>
</header>

<div id="content"></div>

<script>
var TEAMS = [
  { city:'Buffalo',       name:'Almanacs',   abbr:'BUF', conf:'AFG', div:'East'  },
  { city:'Miami',         name:'Flamingos',  abbr:'MIA', conf:'AFG', div:'East'  },
  { city:'New England',   name:'Puritans',   abbr:'NWE', conf:'AFG', div:'East'  },
  { city:'New York',      name:'Pigeons',    abbr:'NYP', conf:'AFG', div:'East'  },
  { city:'Pittsburgh',    name:'Casseroles', abbr:'PIT', conf:'AFG', div:'North' },
  { city:'Baltimore',     name:'Tugboats',   abbr:'BAL', conf:'AFG', div:'North' },
  { city:'Cleveland',     name:'Geology',    abbr:'CLE', conf:'AFG', div:'North' },
  { city:'Cincinnati',    name:'Spoons',     abbr:'CIN', conf:'AFG', div:'North' },
  { city:'Tennessee',     name:'Vowels',     abbr:'TEN', conf:'AFG', div:'South' },
  { city:'Indianapolis',  name:'Speedway',   abbr:'IND', conf:'AFG', div:'South' },
  { city:'Houston',       name:'Humidity',   abbr:'HOU', conf:'AFG', div:'South' },
  { city:'Jacksonville',  name:'Mullets',    abbr:'JAX', conf:'AFG', div:'South' },
  { city:'Kansas City',   name:'Middlemen',  abbr:'KCY', conf:'AFG', div:'West'  },
  { city:'Las Vegas',     name:'The House',  abbr:'LVG', conf:'AFG', div:'West'  },
  { city:'Denver',        name:'Prospectors',abbr:'DEN', conf:'AFG', div:'West'  },
  { city:'Los Angeles',   name:'Smog',       abbr:'LAP', conf:'AFG', div:'West'  },
  { city:'Philadelphia',  name:'Mummers',    abbr:'PHI', conf:'NFG', div:'East'  },
  { city:'Dallas',        name:'Tycoons',    abbr:'DAL', conf:'NFG', div:'East'  },
  { city:'New York',      name:'Gargoyles',  abbr:'NYA', conf:'NFG', div:'East'  },
  { city:'Washington',    name:'Monuments',  abbr:'WAS', conf:'NFG', div:'East'  },
  { city:'Chicago',       name:'Gusts',      abbr:'CHI', conf:'NFG', div:'North' },
  { city:'Green Bay',     name:'Curds',      abbr:'GBP', conf:'NFG', div:'North' },
  { city:'Minnesota',     name:'Loons',      abbr:'MIN', conf:'NFG', div:'North' },
  { city:'Detroit',       name:'Potholes',   abbr:'DET', conf:'NFG', div:'North' },
  { city:'New Orleans',   name:'Gumbo',      abbr:'NOS', conf:'NFG', div:'South' },
  { city:'Carolina',      name:'Sweet Tea',  abbr:'CAR', conf:'NFG', div:'South' },
  { city:'Atlanta',       name:'Offramps',   abbr:'ATL', conf:'NFG', div:'South' },
  { city:'Tampa Bay',     name:'Manatees',   abbr:'TAM', conf:'NFG', div:'South' },
  { city:'San Francisco', name:'Fog',        abbr:'SFO', conf:'NFG', div:'West'  },
  { city:'Seattle',       name:'Drizzle',    abbr:'SEA', conf:'NFG', div:'West'  },
  { city:'Los Angeles',   name:'Billboards', abbr:'LAM', conf:'NFG', div:'West'  },
  { city:'Arizona',       name:'Mirage',     abbr:'ARI', conf:'NFG', div:'West'  },
];

// Get team from URL
var params = new URLSearchParams(window.location.search);
var ABBR = params.get('team') || 'BUF';
var TEAM = TEAMS.find(function(t){return t.abbr===ABBR;}) || TEAMS[0];
document.getElementById('hdr-sub').textContent = TEAM.abbr + ' \u00b7 ' + TEAM.name.toUpperCase();

// Load data
var season = null, roster = null, pStats = {}, records = {};
try { season = JSON.parse(localStorage.getItem('gridiron_season')||'null'); } catch(e){}
try { roster = JSON.parse(localStorage.getItem('gridiron_roster')||'null'); } catch(e){}
try { pStats = JSON.parse(localStorage.getItem('gridiron_player_stats')||'{}'); } catch(e){}

// Compute record for this team
function computeRecord() {
  var r={w:0,l:0,tie:0,pf:0,pa:0};
  if(!season) return r;
  season.results.forEach(function(wk){
    wk.forEach(function(g){
      if(!g.played) return;
      if(g.away===ABBR){r.pf+=g.awayScore;r.pa+=g.homeScore;if(g.winner==='away')r.w++;else if(g.winner==='home')r.l++;else r.tie++;}
      else if(g.home===ABBR){r.pf+=g.homeScore;r.pa+=g.awayScore;if(g.winner==='home')r.w++;else if(g.winner==='away')r.l++;else r.tie++;}
    });
  });
  return r;
}

function pct(r){var g=r.w+r.l+r.tie;return g?(r.w/g).toFixed(3).replace(/^0/,''):'—';}
function projStr(p) {
  if(!p.proj) return '';
  var parts=[];
  if(p.proj.yds)  parts.push(p.proj.yds+'yds');
  if(p.proj.td)   parts.push(p.proj.td+'td');
  if(p.proj.int)  parts.push(p.proj.int+'int');
  if(p.proj.car)  parts.push(p.proj.car+'car');
  if(p.proj.rec)  parts.push(p.proj.rec+'rec');
  if(p.proj.fgm)  parts.push(p.proj.fgm+'fgm');
  return parts.join(' / ');
}

// Game log
function gameLog() {
  var log=[];
  if(!season) return log;
  season.results.forEach(function(wk,wi){
    wk.forEach(function(g){
      if(g.away!==ABBR&&g.home!==ABBR) return;
      var isAway=g.away===ABBR;
      var oppAbbr=isAway?g.home:g.away;
      var opp=TEAMS.find(function(t){return t.abbr===oppAbbr;})||{abbr:oppAbbr,name:oppAbbr};
      var myScore=isAway?g.awayScore:g.homeScore;
      var theirScore=isAway?g.homeScore:g.awayScore;
      var result='—';
      if(g.played){
        if(g.winner==='tie') result='T';
        else if((g.winner==='away'&&isAway)||(g.winner==='home'&&!isAway)) result='W';
        else result='L';
      }
      log.push({week:wi+1,opp:opp,myScore:myScore,theirScore:theirScore,result:result,played:g.played,isAway:isAway});
    });
  });
  return log;
}

// Render
var rec = computeRecord();
var teamRoster = (roster && roster[ABBR]) ? roster[ABBR] : null;
var teamStats = pStats[ABBR] || {};
var log = gameLog();

var html='';

// Hero
html+='<div class="team-hero">'+
  '<div class="hero-abbr">'+TEAM.abbr+'</div>'+
  '<div class="hero-info">'+
    '<div class="hero-city">'+TEAM.city+'</div>'+
    '<div class="hero-name">'+TEAM.name+'</div>'+
    '<div class="hero-conf">'+TEAM.conf+' &middot; '+TEAM.div+'</div>'+
  '</div>'+
  '<div>'+
    '<div class="hero-record">'+rec.w+'-'+rec.l+(rec.tie?'-'+rec.tie:'')+'</div>'+
    '<div class="hero-pct">'+pct(rec)+' PCT &middot; '+rec.pf+' PF &middot; '+rec.pa+' PA</div>'+
  '</div>'+
'</div>';

// Roster
html+='<div class="sec-hdr">Roster</div>';
if (teamRoster && teamRoster.length) {
  html+='<div class="roster-grid">';
  ['QB','RB','WR','K'].forEach(function(pos){
    var players=teamRoster.filter(function(p){return p.pos===pos;});
    var posClass='pos-'+pos.toLowerCase();
    html+='<div class="pos-group '+posClass+'"><div class="pos-group-title">'+pos+'</div>';
    if(!players.length){ html+='<div class="no-data">None drafted</div>'; }
    players.forEach(function(p){
      var ovrColor=p.ovr>=16?'#f0c830':p.ovr>=12?'#7af5a0':p.ovr>=8?'#888':'#555';
      html+='<div class="player-card">'+
        '<div style="display:flex;justify-content:space-between;align-items:baseline">'+
          '<span class="pc-name">'+p.name+'</span>'+
          '<span class="pc-ovr" style="color:'+ovrColor+'">'+p.ovr+'</span>'+
        '</div>'+
        (p.proj?'<div class="pc-proj">proj: '+projStr(p)+'</div>':'')+
      '</div>';
    });
    html+='</div>';
  });
  html+='</div>';
} else {
  html+='<div class="no-data">Draft hasn\'t happened yet. <a href="gridiron_draft.html" style="color:#f0c830">Go to Draft &rarr;</a></div>';
}

// Season Stats
html+='<div class="sec-hdr">Season Stats</div>';
var statCards=Object.keys(teamStats).filter(function(k){return teamStats[k];});
if (statCards.length) {
  html+='<div class="stat-row">';
  statCards.forEach(function(name){
    var p=teamStats[name];
    var posColor={QB:'#7ab8f5',RB:'#7af5a0',WR:'#f5c87a',K:'#d07af5'}[p.pos]||'#888';
    var line='';
    if(p.pos==='QB') line=(p.cmp||0)+'/'+(p.att||0)+', '+(p.yds||0)+' yds, '+(p.td||0)+' TD, '+(p.int||0)+' INT';
    else if(p.pos==='RB') line=(p.car||0)+' car, '+(p.yds||0)+' yds, '+(p.td||0)+' TD';
    else if(p.pos==='WR') line=(p.rec||0)+'/'+(p.tgt||0)+', '+(p.yds||0)+' yds, '+(p.td||0)+' TD';
    else if(p.pos==='K') line=(p.fgm||0)+'/'+(p.fga||0)+' FG';
    html+='<div class="stat-card">'+
      '<div class="sc-pos" style="color:'+posColor+'">'+p.pos+'</div>'+
      '<div class="sc-name">'+name+'</div>'+
      '<div class="sc-line">'+line+'</div>'+
    '</div>';
  });
  html+='</div>';
} else {
  html+='<div class="no-data">No stats yet. Games must be played first.</div>';
}

// Game Log
html+='<div class="sec-hdr">Game Log</div>';
if(log.length){
  var logRows=log.map(function(g){
    var cls=g.played?(g.result==='W'?'win':g.result==='L'?'loss':'tie'):'';
    var score=g.played?g.myScore+' \u2013 '+g.theirScore:'vs';
    return '<tr>'+
      '<td>Wk '+g.week+'</td>'+
      '<td>'+(g.isAway?'@ ':'vs ')+
        '<a href="gridiron_team.html?team='+g.opp.abbr+'">'+g.opp.abbr+'</a>'+
      '</td>'+
      '<td class="'+cls+'">'+(g.played?g.result:'—')+'</td>'+
      '<td>'+score+'</td>'+
    '</tr>';
  }).join('');
  html+='<table class="game-log-tbl"><thead><tr><th>Week</th><th>Opponent</th><th>Result</th><th>Score</th></tr></thead><tbody>'+logRows+'</tbody></table>';
} else {
  html+='<div class="no-data">Season hasn\'t started. <a href="gridiron_season.html" style="color:#f0c830">Go to Season &rarr;</a></div>';
}

document.getElementById('content').innerHTML=html;
</script>
</body>
</html>
