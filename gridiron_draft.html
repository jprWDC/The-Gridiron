<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Gridiron | Draft</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#080808; color:#fff; font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; padding:20px; }

    header { display:flex; align-items:baseline; gap:14px; margin-bottom:20px; padding-bottom:10px; border-bottom:1px solid #1c1c1c; }
    header h1 { font-size:18px; letter-spacing:4px; font-weight:900; text-transform:uppercase; }
    header .sub { font-size:11px; color:#444; letter-spacing:1px; }
    .nav-links { margin-left:auto; display:flex; gap:10px; align-items:center; }
    .nav-links a { font-size:10px; color:#555; text-decoration:none; letter-spacing:1px; font-weight:700; text-transform:uppercase; transition:color .15s; }
    .nav-links a:hover { color:#f0c830; }
    .nav-links a.active { color:#f0c830; }
    .dev-badge { font-size:9px; color:#400; background:#1a0000; border:1px solid #3a0000; padding:2px 7px; border-radius:2px; cursor:pointer; letter-spacing:1px; font-weight:700; user-select:none; }
    .dev-badge:hover { color:#f00; }

    /* ── Page layout ── */
    .top-layout { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
    .main-layout { display:grid; grid-template-columns:1fr 320px; gap:16px; }
    @media(max-width:900px) { .top-layout,.main-layout { grid-template-columns:1fr; } }

    /* ── On the Clock ── */
    .clock-card { background:#111; border:1px solid #222; border-radius:3px; padding:16px; }
    .clock-label { font-size:9px; font-weight:700; color:#555; letter-spacing:2px; text-transform:uppercase; margin-bottom:6px; }
    .clock-team { font-size:20px; font-weight:900; color:#fff; letter-spacing:1px; }
    .clock-team .hl { color:#f0c830; }
    .clock-round { font-size:10px; color:#555; margin-top:3px; letter-spacing:1px; }
    .cd-bg { height:3px; background:#1c1c1c; border-radius:2px; overflow:hidden; margin:12px 0 10px; }
    .cd-fill { height:100%; background:#f0c830; border-radius:2px; transition:width 1s linear; }
    .cd-time { font-size:9px; color:#555; text-align:right; margin-top:-8px; margin-bottom:8px; letter-spacing:1px; }
    .pick-btns { display:grid; grid-template-columns:repeat(4,1fr); gap:5px; }
    .pbtn {
      background:#181818; border:1px solid #282828; color:rgba(255,255,255,0.45);
      padding:8px 4px 10px; text-align:center; cursor:pointer; border-radius:2px;
      font-family:inherit; transition:all .12s; user-select:none;
      display:flex; flex-direction:column; align-items:center; gap:3px;
    }
    .pbtn:hover { background:#202020; border-color:#3a3a3a; color:#fff; }
    .pbtn.sel { background:#161200; border-color:#c8a020; color:#f0c830; }
    .pbtn-pos  { font-size:8px; font-weight:800; letter-spacing:1px; color:inherit; }
    .pbtn-name { font-size:10px; font-weight:700; line-height:1.3; }
    .pbtn-ovr  { font-size:16px; font-weight:900; line-height:1; color:#f0c830; }
    .pbtn.sel .pbtn-ovr { color:#fff; }
    .pbtn-votes { font-size:11px; font-weight:700; color:rgba(255,255,255,0.4); line-height:1; }
    .pbtn.sel .pbtn-votes { color:#f0c830; }
    .ai-msg { text-align:center; padding:22px 0; font-size:12px; color:#333; font-style:italic; }
    .done-msg { text-align:center; padding:28px; font-size:13px; color:#f0c830; font-weight:700; letter-spacing:2px; }

    /* ── Team Value Grid ── */
    .value-grid-card { background:#0d0d0d; border:1px solid #1a1a1a; border-radius:3px; padding:14px; }
    .vg-title { font-size:9px; font-weight:700; color:#555; letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; }
    .vg-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; }
    .vg-cell {
      background:#111; border:1px solid #1a1a1a; border-radius:2px;
      padding:5px 6px; text-align:center;
    }
    .vg-cell.my-team { border-color:#7a6800; background:#100e00; }
    .vg-abbr { font-size:9px; font-weight:800; letter-spacing:1px; color:#777; }
    .vg-cell.my-team .vg-abbr { color:#f0c830; }
    .vg-val  { font-size:14px; font-weight:900; color:#fff; line-height:1.1; }
    .vg-delta { font-size:8px; color:#3d8; font-weight:700; min-height:10px; }
    .vg-delta.neg { color:#e06060; }

    /* ── Section headers ── */
    .sec-hdr { font-size:10px; font-weight:700; color:#f0c830; letter-spacing:3px; text-transform:uppercase; margin:14px 0 10px; display:flex; align-items:center; gap:10px; }
    .sec-hdr::after { content:''; flex:1; height:1px; background:#1e1e1e; }

    /* ── Player Pool ── */
    .pos-filters { display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
    .pos-btn { font-size:9px; font-weight:700; letter-spacing:1px; padding:3px 9px; border-radius:2px; border:1px solid #2a2a2a; background:#151515; color:#555; cursor:pointer; transition:all .12s; user-select:none; }
    .pos-btn:hover { color:#aaa; border-color:#444; }
    .pos-btn.active { border-color:#f0c830; color:#f0c830; background:#111000; }
    .player-list { display:flex; flex-direction:column; gap:2px; max-height:350px; overflow-y:auto; }
    .player-row {
      display:grid; grid-template-columns:22px 1fr 70px 28px; gap:8px; align-items:center;
      padding:6px 10px; background:#111; border:1px solid #1a1a1a; border-radius:2px;
      font-size:10px; transition:border-color .12s;
    }
    .player-row:hover { border-color:#2a2a2a; }
    .player-row.drafted { opacity:.25; }
    .pr-pos { font-size:8px; font-weight:800; letter-spacing:1px; }
    .pr-name { font-weight:600; color:#ddd; }
    .pr-proj { font-size:9px; color:#444; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .pr-ovr { font-size:13px; font-weight:900; text-align:right; }
    .pos-qb { color:#7ab8f5; } .pos-rb { color:#7af5a0; }
    .pos-wr { color:#f5c87a; } .pos-k  { color:#d07af5; }
    .ovr-s  { color:#f0c830; } /* 16-20 */
    .ovr-a  { color:#78e888; } /* 12-15 */
    .ovr-b  { color:#aaa; }    /* 8-11  */
    .ovr-c  { color:#555; }    /* 1-7   */

    /* ── Draft Board ── */
    .draft-board { background:#0d0d0d; border:1px solid #1a1a1a; border-radius:3px; }
    .db-hdr { padding:9px 13px; font-size:10px; font-weight:700; color:#555; letter-spacing:2px; text-transform:uppercase; border-bottom:1px solid #1a1a1a; display:flex; justify-content:space-between; }
    .db-hdr span { color:#333; font-size:9px; }
    .pick-log { max-height:480px; overflow-y:auto; }
    .pick-row { padding:6px 13px; border-bottom:1px solid #111; font-size:10px; display:flex; gap:8px; align-items:baseline; }
    .pick-row.my-pick { background:#0d0b00; }
    .pick-num  { color:#333; min-width:36px; font-size:9px; }
    .pick-team { font-weight:800; letter-spacing:1px; font-size:10px; min-width:30px; }
    .pick-team.mine { color:#f0c830; }
    .pick-pname { color:#bbb; flex:1; }
    .pick-ppos  { font-size:8px; font-weight:700; letter-spacing:1px; }
    .pick-povr  { font-size:11px; font-weight:900; margin-left:4px; }

    /* ── Dev panel ── */
    .dev-panel { display:none; background:#0d0000; border:1px solid #3a0000; padding:7px 12px; margin-bottom:14px; align-items:center; gap:8px; border-radius:2px; flex-wrap:wrap; }
    .dev-panel.open { display:flex; }
    .dev-tag { font-size:9px; color:#c00; font-weight:900; letter-spacing:2px; }
    .dev-btn { background:#1a0000; border:1px solid #500000; color:#e05050; padding:4px 10px; border-radius:2px; font-size:10px; font-weight:700; letter-spacing:.5px; cursor:pointer; font-family:inherit; text-transform:uppercase; }
    .dev-btn:hover { background:#2e0000; border-color:#800; color:#ff8080; }
    .dev-sep { width:1px; height:16px; background:#3a0000; }
  </style>
</head>

    <div class="vg-grid" id="vg-grid"></div>
  </div>
</div>

<!-- Main layout: Player pool left, Draft board right -->
<div class="main-layout">
  <div>
    <div class="sec-hdr">Available Players</div>
    <div class="pos-filters">

      <div class="pos-btn" onclick="setFilter('WR')"  id="filt-WR">WR</div>
      <div class="pos-btn" onclick="setFilter('K')"   id="filt-K">K</div>
    </div>
    <div class="player-list" id="player-list"></div>
  </div>

  <div>

  {name:'H. Stein',       pos:'K',  ovr: 4, attr:'Specialist',    proj:{fgm:14,fga:20}},
];

PLAYER_POOL.forEach(function(p,i){ p.id=i; p.drafted=false; p.draftedBy=null; });

// ── State ─────────────────────────────────────────────────────
var teamOVR     = {};
TEAMS.forEach(function(t){ teamOVR[t.abbr] = 0; });
var teamOVRPrev = {};
TEAMS.forEach(function(t){ teamOVRPrev[t.abbr] = 0; });

var currentPick    = 0;
var pickLog        = [];
var cdTimer        = null;
var cdRemaining    = CD_SECS;
var chosen         = null;
var votes          = {0:0,1:0,2:0,3:0};
var waitingForVote = false;
var posFilter      = 'ALL';
var currentOptions = [];

// ── Helpers ───────────────────────────────────────────────────
function availablePlayers() {
  return PLAYER_POOL.filter(function(p){ return !p.drafted; });
}

function ovrCls(v) {
  if (v>=16) return 'ovr-s';
  if (v>=12) return 'ovr-a';
  if (v>= 8) return 'ovr-b';
  return 'ovr-c';
}

function posCls(pos){ return 'pos-'+pos.toLowerCase(); }

function projStr(p) {
  var g = p.proj;
  if (p.pos==='QB')  return g.cmp+' cmp / '+g.yds+' yds / '+g.td+'td '+g.int+'int';
  if (p.pos==='RB')  return g.car+' car / '+g.yds+' yds / '+g.td+'td';
  if (p.pos==='WR')  return g.rec+' rec / '+g.yds+' yds / '+g.td+'td';
  if (p.pos==='K')   return g.fgm+'/'+g.fga+' FG';
  return '';
}

// ── Team OVR Grid ─────────────────────────────────────────────
function renderOVRGrid() {
  var grid = document.getElementById('vg-grid');
  grid.innerHTML = TEAMS.map(function(t){
    var val   = teamOVR[t.abbr];
    var delta = val - teamOVRPrev[t.abbr];
    var mine  = t.abbr === MY_TEAM;
    var dc    = delta>0 ? '' : (delta<0?'neg':'');
    var ds    = delta>0 ? '+'+delta : (delta<0?''+delta:'');
    return '<div class="vg-cell'+(mine?' my-team':'')+'">'+
      '<div class="vg-abbr">'+t.abbr+'</div>'+
      '<div class="vg-val">'+val+'</div>'+
      '<div class="vg-delta '+dc+'">'+(ds||'&mdash;')+'</div>'+
    '</div>';
  }).join('');
}

// ── Player List ───────────────────────────────────────────────
function renderPlayerList() {
  var list = document.getElementById('player-list');
  var all  = PLAYER_POOL.filter(function(p){ return posFilter==='ALL'||p.pos===posFilter; });
  list.innerHTML = all.map(function(p){
    return '<div class="player-row'+(p.drafted?' drafted':'')+'">'+
      '<span class="pr-pos '+posCls(p.pos)+'">'+p.pos+'</span>'+
      '<div>'+
        '<div class="pr-name">'+p.name+(p.draftedBy?' <span style="color:#2a2a2a;font-size:9px;">\u2014 '+p.draftedBy+'</span>':'')+'</div>'+
        '<div class="pr-proj"><em>proj:</em> '+projStr(p)+'</div>'+
      '</div>'+
      '<div class="pr-proj" style="text-align:right;">'+p.attr+'</div>'+
      '<div class="pr-ovr '+ovrCls(p.ovr)+'">'+p.ovr+'</div>'+
    '</div>';
  }).join('');
}

// ── Pick Log ──────────────────────────────────────────────────
function renderPickLog() {
  var log  = document.getElementById('pick-log');
  var mine = MY_TEAM;
  log.innerHTML = pickLog.map(function(e){
    var isMine = e.team===mine;
    return '<div class="pick-row'+(isMine?' my-pick':'')+'">'+
      '<span class="pick-num">'+e.num+'</span>'+
      '<span class="pick-team'+(isMine?' mine':'')+'">'+e.team+'</span>'+
      '<span class="pick-pname">'+e.player+'</span>'+
      '<span class="pick-ppos '+posCls(e.pos)+'">'+e.pos+'</span>'+
      '<span class="pick-povr '+ovrCls(e.ovr)+'">'+e.ovr+'</span>'+
    '</div>';
  }).reverse().join('');
  document.getElementById('pick-counter').textContent =
    'Pick '+(Math.min(currentPick+1, totalPicks))+' of '+totalPicks;
}

// ── Vote counting ─────────────────────────────────────────────
function updateVoteCounts() {
  currentOptions.forEach(function(p,i){
    var el = document.getElementById('pvot-'+i);
    if (el) el.textContent = votes[i]||0;
  });
}

// ── Countdown ─────────────────────────────────────────────────
function startCountdown(onDone) {
  cdRemaining = CD_SECS; chosen=null; votes={0:0,1:0,2:0,3:0};
  var bar  = document.getElementById('cd-fill');
  var tEl  = document.getElementById('cd-time');
  bar.style.transition='none'; bar.style.width='100%';
  stopCountdown();
  cdTimer = setInterval(function(){
    cdRemaining--;
    bar.style.transition='width 1s linear';
    bar.style.width=(cdRemaining/CD_SECS*100)+'%';
    if (tEl) tEl.textContent = cdRemaining+'s remaining';
    updateVoteCounts();
    if (cdRemaining<=0){ stopCountdown(); onDone(); }
  },1000);
}

function stopCountdown(){
  if (cdTimer){ clearInterval(cdTimer); cdTimer=null; }
}

// ── Execute pick ──────────────────────────────────────────────
function executePick(pickIdx, player) {
  var abbr = draftOrder[pickIdx];
  TEAMS.forEach(function(t){ teamOVRPrev[t.abbr] = teamOVR[t.abbr]; });
  teamOVR[abbr] += player.ovr;
  player.drafted = true;
  player.draftedBy = abbr;
  var roundN = Math.floor(pickIdx/32)+1;
  var pickN  = (pickIdx%32)+1;
  pickLog.push({ num:'R'+roundN+' P'+pickN, team:abbr, player:player.name, pos:player.pos, ovr:player.ovr });
  renderPickLog();
  renderPlayerList();
  renderOVRGrid();
}

// ── AI pick ───────────────────────────────────────────────────
function runAIPick() {
  var avail = availablePlayers();
  if (!avail.length){ endDraft(); return; }
  // AI biases toward highest available player (with some randomness)
  avail.sort(function(a,b){ return b.ovr-a.ovr; });
  var topN  = Math.min(6, avail.length);
  var p     = avail[Math.floor(Math.random()*topN)];
  executePick(currentPick, p);
  currentPick++;
  setTimeout(advanceDraft, 700+Math.random()*600);
}

// ── My pick ───────────────────────────────────────────────────
function runMyPick() {
  waitingForVote = true;
  var avail = availablePlayers();
  if (!avail.length){ endDraft(); return; }
  // Show 4 best available players as options
  avail.sort(function(a,b){ return b.ovr-a.ovr; });
  var topPool = avail.slice(0, Math.min(12, avail.length));
  // Shuffle top pool slightly so it's not always same order
  for (var i=topPool.length-1; i>0; i--){
    var j=Math.floor(Math.random()*(i+1)); var tmp=topPool[i]; topPool[i]=topPool[j]; topPool[j]=tmp;
  }
  currentOptions = topPool.slice(0,4);
  var area = document.getElementById('pick-area');
  area.innerHTML = '<div class="pick-btns">'+
    currentOptions.map(function(p,i){
      return '<div class="pbtn" id="pbtn-'+i+'" onclick="vote('+i+')">'+
        '<span class="pbtn-pos '+posCls(p.pos)+'">'+p.pos+'</span>'+
        '<span class="pbtn-name">'+p.name+'</span>'+
        '<span class="pbtn-ovr">'+p.ovr+'</span>'+
        '<span class="pbtn-votes" id="pvot-'+i+'">0</span>'+
      '</div>';
    }).join('')+
  '</div>';
  startCountdown(function(){
    // Resolve: user's explicit choice wins; else most-voted; else random
    var winner = chosen;
    if (winner===null){
      var best=-1, bestV=-1;
      currentOptions.forEach(function(p,i){ if((votes[i]||0)>bestV){ bestV=votes[i]||0; best=i; } });
      winner = best>=0 ? best : Math.floor(Math.random()*currentOptions.length);
    }
    executePick(currentPick, currentOptions[winner]);
    waitingForVote=false; currentOptions=[]; currentPick++;
    setTimeout(advanceDraft, 1200);
  });
}

function vote(idx) {
  if (!waitingForVote) return;
  if (chosen!==null) votes[chosen]=Math.max(0,(votes[chosen]||0)-1);
  chosen=idx; votes[idx]=(votes[idx]||0)+1;
  for(var i=0;i<4;i++){
    var el=document.getElementById('pbtn-'+i);
    if(el) el.classList.remove('sel');
  }
  var sel=document.getElementById('pbtn-'+idx);
  if(sel) sel.classList.add('sel');
}

// ── Advance draft ─────────────────────────────────────────────
function advanceDraft() {
  if (currentPick >= totalPicks){ endDraft(); return; }
  var abbr   = draftOrder[currentPick];
  var roundN = Math.floor(currentPick/32)+1;
  var pickN  = (currentPick%32)+1;
  var t      = TEAMS.find(function(t){ return t.abbr===abbr; });
  var isMine = abbr===MY_TEAM;
  document.getElementById('clock-team').innerHTML =
    isMine ? '<span class="hl">'+t.city+' '+t.name+'</span>'
           : t.city+' '+t.name;
  document.getElementById('clock-round').textContent =
    'Round '+roundN+' \u00b7 Pick '+pickN+' of '+totalPicks;
  var area = document.getElementById('pick-area');
  if (isMine){
    area.innerHTML = '';
    runMyPick();
  } else {
    stopCountdown();
    var bar = document.getElementById('cd-fill');
    bar.style.transition='none'; bar.style.width='0%';
    document.getElementById('cd-time').textContent='';
    area.innerHTML = '<div class="ai-msg">'+abbr+' is on the clock\u2026</div>';
    setTimeout(runAIPick, 900+Math.random()*900);
  }
}

function endDraft() {
  stopCountdown();
  var cc = document.getElementById('clock-card');
  cc.innerHTML = '<div class="done-msg">\u{1F3C6} Draft Complete \u{1F3C6}'+
    '<div style="font-size:11px;font-weight:400;color:#555;letter-spacing:1px;margin-top:8px;">Season 1 roster locked.</div></div>';

  // Save all rosters to localStorage
  try {
    var rosters = {};
    TEAMS.forEach(function(t) { rosters[t.abbr] = []; });
    pickLog.forEach(function(pick) {
      var player = PLAYER_POOL.find(function(p) { return p.name === pick.player; });
      if (rosters[pick.team] && player) {
        rosters[pick.team].push({ name:player.name, pos:player.pos, ovr:player.ovr, proj:player.proj });
      }
    });
    localStorage.setItem('gridiron_roster', JSON.stringify(rosters));
  } catch(e) {}
}

// ── Filter ────────────────────────────────────────────────────
function setFilter(pos){
  posFilter=pos;
  ['ALL','QB','RB','WR','K'].forEach(function(p){
    document.getElementById('filt-'+p).classList.toggle('active',p===pos);
  });
  renderPlayerList();
}

// ── Dev ───────────────────────────────────────────────────────
function devToggle(){ document.getElementById('dev-panel').classList.toggle('open'); }

function devNextPick(){
  if (currentPick>=totalPicks) return;
  stopCountdown(); waitingForVote=false; chosen=null; currentOptions=[];
  var avail=availablePlayers();
  if (!avail.length){ endDraft(); return; }
  avail.sort(function(a,b){return b.ovr-a.ovr;});
  executePick(currentPick, avail[Math.floor(Math.random()*Math.min(6,avail.length))]);
  currentPick++;
  setTimeout(advanceDraft, 400);
}

function devSkipToMyPick(){
  while(currentPick<totalPicks && draftOrder[currentPick]!==MY_TEAM){
    var avail=availablePlayers(); if(!avail.length) break;
    avail.sort(function(a,b){return b.ovr-a.ovr;});
    executePick(currentPick, avail[Math.floor(Math.random()*Math.min(6,avail.length))]);
    currentPick++;
  }
  stopCountdown(); waitingForVote=false; chosen=null; currentOptions=[];
  if(currentPick<totalPicks) setTimeout(advanceDraft,300); else endDraft();
}

function devFinishDraft(){
  stopCountdown(); waitingForVote=false; chosen=null; currentOptions=[];
  while(currentPick<totalPicks){
    var avail=availablePlayers(); if(!avail.length) break;
    avail.sort(function(a,b){return b.ovr-a.ovr;});
    executePick(currentPick, avail[Math.floor(Math.random()*Math.min(6,avail.length))]);
    currentPick++;
  }
  endDraft();
}

function devResetDraft(){
  stopCountdown(); waitingForVote=false; chosen=null; currentOptions=[]; currentPick=0; pickLog=[];
  PLAYER_POOL.forEach(function(p){ p.drafted=false; p.draftedBy=null; });
  TEAMS.forEach(function(t){ teamOVR[t.abbr]=0; teamOVRPrev[t.abbr]=0; });
  renderPickLog(); renderPlayerList(); renderOVRGrid();
  advanceDraft();
}

document.addEventListener('keydown',function(e){ if(e.key==='`'||e.key==='~') devToggle(); });

// ── Init ──────────────────────────────────────────────────────
renderPlayerList();
renderPickLog();
renderOVRGrid();
advanceDraft();
</script>
</body>
</html>
