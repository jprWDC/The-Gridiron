// ── Schedule Generation (same algorithm as before) ─────────────
function generateSchedule() {
  var allG = [], playCount = {}, teamTotal = {};
  TEAMS.forEach(function(a){ teamTotal[a.abbr]=0; TEAMS.forEach(function(b){ playCount[a.abbr+'_'+b.abbr]=0; }); });
  function addGame(aw,ho){ allG.push({away:aw,home:ho}); teamTotal[aw]++; teamTotal[ho]++; playCount[aw+'_'+ho]++; playCount[ho+'_'+aw]++; }
  for(var i=0;i<TEAMS.length;i++) for(var j=i+1;j<TEAMS.length;j++) if(TEAMS[i].conf===TEAMS[j].conf&&TEAMS[i].div===TEAMS[j].div){ addGame(TEAMS[i].abbr,TEAMS[j].abbr); addGame(TEAMS[j].abbr,TEAMS[i].abbr); }
  var attempts=0;
  while(allG.length<272&&attempts<80000){ attempts++; var need=TEAMS.filter(function(t){return teamTotal[t.abbr]<17;}); if(!need.length)break; var a=need[Math.floor(Math.random()*need.length)]; var valid=TEAMS.filter(function(t){return t.abbr!==a.abbr&&teamTotal[t.abbr]<17&&playCount[a.abbr+'_'+t.abbr]<2;}); if(!valid.length)continue; var b=valid[Math.floor(Math.random()*valid.length)]; Math.random()<0.5?addGame(a.abbr,b.abbr):addGame(b.abbr,a.abbr); }
  for(var s=allG.length-1;s>0;s--){ var r=Math.floor(Math.random()*(s+1)); var tmp=allG[s];allG[s]=allG[r];allG[r]=tmp; }
  var weeks=[]; for(var w=0;w<17;w++) weeks.push([]);
  for(var gi=0;gi<allG.length;gi++){ var game=allG[gi]; var wo=[]; for(var w=0;w<17;w++) wo.push(w); wo.sort(function(){return Math.random()-0.5;}); for(var wi=0;wi<wo.length;wi++){ var ww=wo[wi]; if(weeks[ww].length>=16)continue; var busy={}; weeks[ww].forEach(function(g){busy[g.away]=true;busy[g.home]=true;}); if(!busy[game.away]&&!busy[game.home]){weeks[ww].push(game);break;} } }
  return weeks;
}

// ── Helpers ────────────────────────────────────────────────────
function pct(r){ var g=r.w+r.l+r.tie; return g?r.w/g:0; }
function pctStr(r){ var g=r.w+r.l+r.tie; if(!g)return '—'; return (r.w/g).toFixed(3).replace(/^0/,''); }
function recStr(r){ return r.w+'-'+r.l+(r.tie?'-'+r.tie:''); }
function fmt(s){ var m=Math.floor(s/60),sec=s%60; return m+':'+(sec<10?'0':'')+sec; }
function cmpTeam(a,b,records){ var ra=records[a.abbr],rb=records[b.abbr]; var pa=pct(ra),pb=pct(rb); if(pb!==pa)return pb-pa; if(rb.pf!==ra.pf)return rb.pf-ra.pf; return ra.pa-rb.pa; }

function computeRecords(games){
  var records={};
  TEAMS.forEach(function(t){records[t.abbr]={w:0,l:0,tie:0,pf:0,pa:0};});
  games.forEach(function(g){
    if(g.status!=='final')return;
    var ra=records[g.away_abbr],rh=records[g.home_abbr];
    if(!ra||!rh)return;
    ra.pf+=g.away_score;ra.pa+=g.home_score;
    rh.pf+=g.home_score;rh.pa+=g.away_score;
    if(g.winner==='away'){ra.w++;rh.l++;}
    else if(g.winner==='home'){rh.w++;ra.l++;}
    else{ra.tie++;rh.tie++;}
  });
  return records;
}

function getPlayoffSeeds(conf,records){
  var ct=TEAMS.filter(function(t){return t.conf===conf;});
  var dw=['East','North','South','West'].map(function(div){ var dt=ct.filter(function(t){return t.div===div;}); dt.sort(function(a,b){return cmpTeam(a,b,records);}); return dt[0]; });
  dw.sort(function(a,b){return cmpTeam(a,b,records);});
  var wm={}; dw.forEach(function(t){wm[t.abbr]=true;});
  var nw=ct.filter(function(t){return !wm[t.abbr];}); nw.sort(function(a,b){return cmpTeam(a,b,records);});
  return dw.concat(nw.slice(0,3));
}

      // Race condition — fetch existing

      S=existing2;
    } else {
      S={id:1,week:1,schedule:sched};
      // Bulk insert all 272 games
      var gameRows=[];
      sched.forEach(function(wk,wi){ wk.forEach(function(g){ gameRows.push({season_week:wi+1,away_abbr:g.away,home_abbr:g.home,away_score:0,home_score:0,quarter:1,secs:900,status:'scheduled',winner:null,updated_at:new Date().toISOString()}); }); });
      // Insert in batches of 100
      for(var i=0;i<gameRows.length;i+=100){ await sb.from('games').insert(gameRows.slice(i,i+100)); }
    }
  }

  viewWeek=S.week;
  await loadWeekGames();
  subscribeRealtime();
  renderAll();
}

async function loadWeekGames(){
  // Fetch ALL games (for standings across all weeks)
  var { data: games } = await sb.from('games').select('*');
  allGames = games || [];
}

// ── Real-time subscription ─────────────────────────────────────
function subscribeRealtime(){
  if(realtimeChannel) sb.removeChannel(realtimeChannel);
  realtimeChannel = sb.channel('games-realtime')
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'games'},function(payload){
      var updated=payload.new;
      for(var i=0;i<allGames.length;i++){ if(allGames[i].id===updated.id){ allGames[i]=updated; break; } }
      renderAll();
    })
    .subscribe();
}

}

function renderWeekNav(){

  document.getElementById('btn-next').disabled=(viewWeek>=17);
  var curWkGames=allGames.filter(function(g){return g.season_week===S.week;});
  var allDone=curWkGames.length>0&&curWkGames.every(function(g){return g.status==='final';});
  var advBtn=document.getElementById('adv-btn');

function renderGames(records){
  var grid=document.getElementById('games-grid');
  var wkGames=allGames.filter(function(g){return g.season_week===viewWeek;});
  // Sort by away_abbr to maintain consistent order
  wkGames.sort(function(a,b){return a.away_abbr<b.away_abbr?-1:1;});
  grid.innerHTML='';
  wkGames.forEach(function(g){
    var isBuf=g.away_abbr==='BUF'||g.home_abbr==='BUF';
    var isViewingCurrent=viewWeek===S.week;
    var over=g.status==='final';
    var awayWin=over&&g.away_score>g.home_score;
    var homeWin=over&&g.home_score>g.away_score;
    var myTeam=MY_TEAM&&(g.away_abbr===MY_TEAM||g.home_abbr===MY_TEAM);

    var statusHtml;
    if(over) statusHtml='<span class="gt-status final">Final</span>';
    else if(isBuf&&isViewingCurrent) statusHtml='<span class="gt-status live"><span class="gt-live-dot"></span>Live</span>';
    else if(isViewingCurrent&&g.status==='live') statusHtml='<span class="gt-status live"><span class="gt-live-dot"></span>Q'+g.quarter+' &middot; '+fmt(g.secs)+'</span>';
    else statusHtml='<span class="gt-status">'+(isViewingCurrent?'Scheduled':'Week '+viewWeek)+'</span>';

    var playLink=(isBuf&&isViewingCurrent&&!over)?'<a class="gt-play-link" href="gridiron_game.html">PLAY NOW &rarr;</a>':'';

    var tile=document.createElement('div');
    tile.className='game-tile'+(isBuf||myTeam?' is-active':'')+(over?' is-over':'');
    tile.innerHTML=
      '<div class="gt-teams">'+
        '<div class="gt-row'+(awayWin?' winner':'')+'"><span class="gt-abbr">'+g.away_abbr+'</span><span class="gt-score">'+g.away_score+'</span></div>'+
        '<div class="gt-row'+(homeWin?' winner':'')+'"><span class="gt-abbr">'+g.home_abbr+'</span><span class="gt-score">'+g.home_score+'</span></div>'+
      '</div>'+
      '<div class="gt-meta">'+statusHtml+playLink+'</div>';
    tile.style.cursor='pointer';
    tile.onclick=(function(abbr){ return function(){ window.location='gridiron_team.html?team='+abbr; }; })(g.away_abbr);
    grid.appendChild(tile);
  });
}

function renderStandings(records){
  var grid=document.getElementById('standings-grid');
  grid.innerHTML='';
  ['AFG','NFG'].forEach(function(conf){
    var seeds=getPlayoffSeeds(conf,records);
    var seedMap={};
    seeds.forEach(function(t,i){seedMap[t.abbr]=i+1;});
    var confDiv=document.createElement('div');
    confDiv.innerHTML='<div class="conf-title">'+conf+' Conference</div>';
    ['East','North','South','West'].forEach(function(div){
      var divTeams=TEAMS.filter(function(t){return t.conf===conf&&t.div===div;});
      divTeams.sort(function(a,b){return cmpTeam(a,b,records);});
      var rows=divTeams.map(function(t){
        var r=records[t.abbr];
        var isMine=MY_TEAM?t.abbr===MY_TEAM:t.abbr==='BUF';
        var seed=seedMap[t.abbr]?'<span style="color:'+(seedMap[t.abbr]<=4?'#f0c830':'#888')+'">'+seedMap[t.abbr]+'</span>':'';
        return '<tr class="'+(isMine?'my-team':'')+'">'+
          '<td class="seed-badge">'+seed+'</td>'+
          '<td><a href="gridiron_team.html?team='+t.abbr+'">'+t.city+' '+t.name+'</a></td>'+
          '<td>'+r.w+'</td><td>'+r.l+'</td><td>'+r.tie+'</td>'+
          '<td class="pct">'+pctStr(r)+'</td>'+
          '<td class="pf">'+r.pf+'</td><td class="pa">'+r.pa+'</td></tr>';
      }).join('');
      confDiv.innerHTML+='<div class="div-block"><div class="div-title">'+conf+' '+div+'</div>'+
        '<table class="std-tbl"><thead><tr><th></th><th>Team</th><th>W</th><th>L</th><th>T</th><th>PCT</th><th>PF</th><th>PA</th></tr></thead>'+
        '<tbody>'+rows+'</tbody></table></div>';
    });
    grid.appendChild(confDiv);
  });
}

function renderBracket(records){
  var wrap=document.getElementById('bracket-wrap');
  wrap.innerHTML='';
  ['AFG','NFG'].forEach(function(conf){
    var seeds=getPlayoffSeeds(conf,records);
    var block=document.createElement('div');
    block.className='bracket-conf';
    var html='<div class="bracket-conf-title">'+conf+' Playoff Picture</div>';
    var s1=seeds[0]; var r1=records[s1.abbr];
    html+='<div class="bracket-bye">&#9655; #1 '+s1.abbr+' \u2014 BYE ('+recStr(r1)+')</div>';
    [[1,6],[2,5],[3,4]].forEach(function(pair){
      var sa=seeds[pair[0]],sb2=seeds[pair[1]];
      if(!sa||!sb2)return;
      var ra=records[sa.abbr],rb=records[sb2.abbr];
      var amI_a=MY_TEAM?sa.abbr===MY_TEAM:sa.abbr==='BUF';
      var amI_b=MY_TEAM?sb2.abbr===MY_TEAM:sb2.abbr==='BUF';
      html+='<div class="bracket-matchup">'+
        '<div class="bm-row"><span class="bm-num">'+(pair[0]+1)+'</span><span class="bm-name'+(amI_a?' my-team':'')+'">'+sa.city+' '+sa.name+'</span><span class="bm-rec">'+recStr(ra)+'</span></div>'+
        '<div class="bm-vs">vs</div>'+
        '<div class="bm-row"><span class="bm-num">'+(pair[1]+1)+'</span><span class="bm-name'+(amI_b?' my-team':'')+'">'+sb2.city+' '+sb2.name+'</span><span class="bm-rec">'+recStr(rb)+'</span></div>'+
        '</div>';
    });
    if(seeds[7]){ var rb2=records[seeds[7].abbr]; html+='<div style="margin-top:8px;font-size:9px;color:#444;letter-spacing:1px;font-weight:700;">FIRST OUT: '+seeds[7].abbr+' ('+recStr(rb2)+')</div>'; }
    block.innerHTML=html;
    wrap.appendChild(block);
  });
}

// ── Week nav ───────────────────────────────────────────────────
function changeWeek(delta){ var nw=viewWeek+delta; if(nw<1||nw>17)return; viewWeek=nw; renderAll(); }

async function advanceWeek(){
  if(S.week>=17)return;
  S.week++;
  await sb.from('seasons').update({week:S.week}).eq('id',1);
  viewWeek=S.week;
  renderAll();
}

// ── Dev ────────────────────────────────────────────────────────
function devToggle(){ document.getElementById('dev-panel').classList.toggle('open'); }

async function devSimWeek(){
  var wkGames=allGames.filter(function(g){return g.season_week===S.week&&g.status!=='final'&&g.away_abbr!=='BUF'&&g.home_abbr!=='BUF';});
  for(var i=0;i<wkGames.length;i++){
    var g=wkGames[i];
    var as=g.away_score,hs=g.home_score,q=g.quarter,secs=g.secs;
    while(true){
      var burn=55+Math.floor(Math.random()*70); secs=Math.max(0,secs-burn);
      var r=Math.random();
      if(r<0.045){var pts=Math.random()>0.06?7:6;Math.random()<0.5?as+=pts:hs+=pts;}
      else if(r<0.065){Math.random()<0.5?as+=3:hs+=3;}
      if(secs<=0){q++;secs=900;if(q>4){q=4;secs=0;break;}}
    }
    var w=as>hs?'away':hs>as?'home':'tie';
    await sb.from('games').update({away_score:as,home_score:hs,quarter:q,secs:0,status:'final',winner:w,updated_at:new Date().toISOString()}).eq('id',g.id);
  }
  await loadWeekGames();
  renderAll();
}

async function devNextWeek(){ await devSimWeek(); if(S.week<17){ S.week++; await sb.from('seasons').update({week:S.week}).eq('id',1); viewWeek=S.week; } await loadWeekGames(); renderAll(); }

async function devResetSeason(){
  await sb.from('games').delete().neq('id','00000000-0000-0000-0000-000000000000');
  await sb.from('seasons').delete().eq('id',1);
  await sb.from('player_stats').delete().neq('id','00000000-0000-0000-0000-000000000000');
  location.reload();
}

document.addEventListener('keydown',function(e){if(e.key==='`'||e.key==='~')devToggle();});

// ── Boot ───────────────────────────────────────────────────────
initSeason();
// Call tick function every 5 seconds (client-driven until cron is set up)
setInterval(tickGames, 5000);
